syntax = "proto3";
package eldercare;

enum EventType {
  SPEECH       = 0;
  AUDIO        = 1;
  FALL         = 2;
  EMERGENCY    = 3;
  OBJECT       = 4;
  IMAGE        = 5;
  VIDEO        = 6;
  REMINDER     = 7;
  VITALS       = 8;
  SYSTEM       = 9;
}

enum Priority {
  LOW      = 0;
  NORMAL   = 1;
  HIGH     = 2;
  CRITICAL = 3;
}

message SpeechPayload {
  string transcript   = 1;
  float  confidence   = 2;
  float  duration_sec = 3;
}

message AudioPayload {
  string audio_base64   = 1;
  string encoding       = 2;
  int32  sample_rate_hz = 3;
  int32  channels       = 4;
  float  duration_sec   = 5;
}

message ImagePayload {
  string image_base64 = 1;
  string mime_type    = 2;
  string location     = 3;
}

message FallPayload {
  float accel_magnitude = 1;
  float gyro_magnitude  = 2;
  bool  button_pressed  = 3;
}

message ObjectPayload {
  string label       = 1;
  float  confidence  = 2;
  bytes  keyframe    = 3;
}

message EmergencyPayload {
  string trigger_source = 1;
  string fsm_state      = 2;
}

message EventEnvelope {
  string    event_id = 1;
  int64     ts       = 2;
  EventType type     = 3;
  Priority  priority = 4;
  oneof payload {
    SpeechPayload    speech    = 10;
    AudioPayload     audio     = 11;
    FallPayload      fall      = 12;
    ObjectPayload    object    = 13;
    EmergencyPayload emergency = 14;
    ImagePayload     image     = 15;
  }
}
