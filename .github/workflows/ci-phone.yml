name: CI Phone Core

on:
  push:
    paths:
      - "phone/**"
      - "contracts/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "phone/**"
      - "contracts/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest phone/tests -q
      - name: Mypy
        run: mypy phone
